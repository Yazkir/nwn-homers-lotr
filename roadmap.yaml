ideas:
  - id: kallrist-dungeon-removed
    title: "Dungeon Area Transition in Kallrist North Shore intentionally removed?"
    group: travel
    status: soon
    type: Defect
    player: Yazkir
    notes: "Looks like broken/removed area transition:&nbsp;<span>the waypoints still exist and the dungeon still exists in the module itself.</span>"
  - id: server-seasons-character-wipe
    title: "Server-wide 'seasons' where achievements get archived and characters get wiped with partial XP bank"
    group: progression
    status: planned
    type: Enhancement
    player: "HomelessSon (Server Admin)"
    notes: "Could be scheduled periodically eventually (e.g. every 3 months), but might be needed ad-hoc as game is re-balanced or major game-changing features are introduced. Season stats would be archived and still viewable on the wiki. Item banks would get wiped, and all characters deleted with with maybe 10% of their XP rolled over into xp bank  (plus keeping 10% of xp already banked)"
  - id: Hard-mode-no-fasttravel
    title: "Hardcore Mode with no fast travel options and permadeath"
    group: progression
    status: planned
    type: Enhancement
    player: "HomelessSon (Server Admin)"
    notes: "For extra challenge: would give a symbol of some kind next to first kill stats for that player, increased rare loot chance, even faster XP. Heal potions have a cool down. Greater sanctuary has a 1 hour real time cooldown."
