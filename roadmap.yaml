# -----------------------------------------------------------------------------
# How merit is spent. Cost is in Merit points unless noted.
# -----------------------------------------------------------------------------
redemption:
  blurb: >-
    Earn Merit by having your reported bugs fixed or your suggested features
    shipped. Spend it from the rest menu (or with a DM) on any of the following.
    Costs are a proof-of-concept and may be tuned.
  categories:
    - name: "Teleport & travel"
      items:
        - { cost: 3,  text: "Rest-menu teleport to your party leader" }
        - { cost: 4,  text: "Rest-menu teleport back to your last Well-of-Eru save point (persists across reboots)" }
        - { cost: 6,  text: "Dedicated, rewriteable save-slot teleport (Slot 1)" }
        - { cost: 7,  text: "Save-slot teleport (Slot 2)" }
        - { cost: 8,  text: "Save-slot teleport (Slot 3)" }
        - { cost: 9,  text: "Save-slot teleport (Slot 4)" }
        - { cost: 10, text: "Save-slot teleport (Slot 5)" }
    - name: "Premium boosts (3x gold & XP)"
      items:
        - { cost: 1, text: "1 week of premium for you (3x gold & XP on all your characters)" }
        - { cost: 3, text: "1 month of premium for you" }
        - { cost: 4, text: "1 week of premium for the whole server — your name joins the login welcome message" }
        - { cost: 8, text: "1 month of premium for the whole server — your name joins the login welcome message" }
    - name: "Vanity & swag"
      items:
        - { cost: 5,  text: "Permanently graffiti the Well of Eru: add a floor/wall placeable with your name & description (within reason, DM approval)" }
        - { cost: 10, text: "A set of Tournament equipment (see the 'Tournament' inaccessible items on the wiki)" }
        - { cost: 25, text: "A real, hand-made duct-tape wallet mailed to you — pick up to 3 colors and a logo/design" }

housing:
  blurb: >-
    Claim any unoccupied locked door in any town as your home (1 per player /
    CD key; moving or upgrading later refunds nothing). You build the area in the
    toolset and send the file; a fast-travel option to it is added to your rest
    menu. You teleport in, and leave through the front door to your chosen city.
  pricing_note: "Cost scales with area size (Length x Width)."
  tiers:
    - { size: "2",   cost: 1 }
    - { size: "4",   cost: 2 }
    - { size: "8",   cost: 3 }
    - { size: "16",  cost: 4 }
    - { size: "32",  cost: 5 }
    - { size: "64",  cost: 6 }
    - { size: "81",  cost: 7 }
    - { size: "100", cost: 8 }
  extras_note: "An area may be split at no cost across up to 2 areas with transitions (basement, attic, arena, etc.)."
  features:
    - { cost: 2,  text: "Persistent storage chest shared across your characters" }
    - { cost: 2,  text: "A Well-of-Eru store with a 100K max buy limit — you pick the NPC name & appearance" }
    - { cost: 5,  text: "Add a Tagget-tier forge to your home" }
    - { cost: 10, text: "Add a Rivendell-tier forge to your home" }
    - { cost: 15, text: "Add a Balrog-tier forge to your home" }

