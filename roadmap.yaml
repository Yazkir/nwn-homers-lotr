    type: Enhancement
    player: "dc0960 (Dungeon_Crawler)"
    date: "2026-06-19"
    notes: "An item to improve epic summons would be nice, not to make them more tanks, but more dps so they do something vs higher bosses. Or a way to improve spells in general, obviously there are a lot of spells that can't be used as they are mobs are just immune to them. Like an item to change implosion to do 'chaos' dmg instead of deatg As a whole for casters there are very little ways to kill something, its either damage shields, igms or epic spell lucky rolls for the majority. So some boosting to lvl 9 spells would be nice"
  - id: respawn-tracker-well-of-eru
    title: "Respawn Tracker in Well of Eru"
    group: bosses
    status: soon
    type: Enhancement
    player: "dc0960 (Dungeon_Crawler)"
    date: "2026-06-19"
    notes: "would a board in well of eru with bosses that are dead and showing how long till respawn be worth it or are respawn times short enough? Standardizing the boss respawn rate and maybe adding drop rates to the loot would be a nice complimenting feature to the bestiary"
  - id: Discord-server-shout-integration
    title: "Discord <-> NWN server shout integration"
    group: wiki-tools
    status: later
    type: Enhancement
    player: "HomelessSon (Server Admin)"
    date: "2026-06-20"
