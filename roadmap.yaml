# =============================================================================
# Homer's LOTR — Roadmap & Player Ideas (source of truth)
#
# Edit this file, then run:  python3 bin/gen-roadmap.py
# It regenerates docs.manual/Roadmap.html (published by the wiki build).
#
# status values (workflow order):
#   awarded     -> shipped; merit awarded to the player (or admin-shipped)
#   implemented -> shipped, in testing / needs verification
#   confirmed   -> bug confirmed / actively being worked right now
#   wip         -> accepted, in the queue ("Up Next")
#   soon        -> queued, one tier deeper than Up Next
#   later        -> queued, further out still
#   planned     -> idea captured, under consideration (not committed to)
#
# Set `player:` to credit a submitter. Omit it for admin/community items.
# Use `dupe_of: <id>` to merge the same idea submitted by multiple players;
# list each requester with `player:` on the duplicate row.
# `commit:` is an optional git reference; `date:` is what the page shows.
# =============================================================================

meta:
  as_of: "2026-06-22"
  intro: >-
    This is the living development roadmap for Homer's LOTR. Almost everything
    here started as a player suggestion or bug report — when an idea ships, the
    player who submitted it earns <strong>Merit</strong> points to spend on the
    rewards below. Have an idea or found a bug? Tell a DM in game or on Discord;
    if it makes the cut, you get the credit.

groups:
  - id: forge
    title: "Forge &amp; Crafting"
    order: 1
  - id: combat-classes
    title: "Combat, Classes &amp; Builds"
    order: 2
  - id: bosses
    title: "Bosses &amp; Difficulty"
    order: 3
  - id: progression
    title: "Progression, Bestiary &amp; Achievements"
    order: 4
  - id: travel
    title: "Teleports &amp; Travel"
    order: 5
  - id: banking
    title: "Banking &amp; Storage"
    order: 6
  - id: wiki-tools
    title: "Wiki &amp; Tools"
    order: 7
  - id: quests-areas
    title: "Quests, Areas &amp; World Fixes"
    order: 8
  - id: items-gear
    title: "Items &amp; Gear"
    order: 9
  - id: meaningwave
    title: "Meaningwave Companions"
    order: 10
  - id: economy
    title: "Economy &amp; Merit"
    order: 11
  - id: qol
    title: "Quality of Life &amp; Buffs"
    order: 12

